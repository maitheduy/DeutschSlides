<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cách 4 (Akkusative) tiếng Đức - Tân ngữ trực tiếp</title>
   
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Nunito:wght@300;400;600;700&display=swap" rel="stylesheet">
   
    <style>
        :root {
            --bg-cream: #F9F6F0;
            --sage-green: #6B8E23;
            --sage-light: #8FBC8F;
            --terracotta: #C17767;
            --terracotta-light: #D48C7A;
            --forest-dark: #2C3525;
            --stone-light: #E8E5D7;
            --sand-warm: #F4E9D8;
            --white-cream: #FFFEF9;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: 'Nunito', sans-serif;
            background-color: var(--bg-cream);
            color: var(--forest-dark);
            overflow: hidden;
            height: 100vh;
        }

        .slides-container {
            height: 100vh;
            display: flex;
            flex-direction: row;
            overflow-x: scroll;
            overflow-y: hidden;
            scroll-snap-type: x mandatory;
            scroll-behavior: smooth;
            -webkit-overflow-scrolling: touch;
        }

        section.slide {
            flex: 0 0 100%;
            width: 100vw;
            height: 100vh;
            scroll-snap-align: start;
            position: relative;
            padding: 30px 5% 60px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        h1 { 
            font-family: 'Playfair Display', serif; 
            font-weight:700; 
            font-size: clamp(2.4rem, 7vw, 5rem); 
            line-height:1.15; 
            margin-bottom:1.2rem; 
            text-align: center;
        }

        p, li { font-size: clamp(1rem, 2.2vw, 1.25rem); line-height:1.75; margin-bottom:0.9rem; }

        .intro-poem {
            font-family: 'Playfair Display', serif;
            font-style: italic;
            color: var(--terracotta);
            font-size: clamp(1.1rem, 2.8vw, 1.45rem);
            text-align: center;
            max-width: 90%;
            margin: 0 auto 35px;
            line-height: 1.9;
            opacity: 0.9;
        }

        .vietnamese-text { font-style: italic; color: var(--terracotta); }
        .german-text    { font-weight: 600; color: var(--sage-green); }

        .blob { border-radius: 40% 60% 70% 30% / 40% 50% 60% 50%; transition: all 0.3s ease; }
        .float { animation: float 3.5s ease-in-out infinite; }
        @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-12px); } }
        .fade-in { animation: fadeIn 1.2s ease-out forwards; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(30px); } to { opacity:1; transform:translateY(0); } }

        .leaf-bg {
            position: absolute;
            opacity: 0.07;
            z-index: 0;
            pointer-events: none;
        }

        .nav-dots {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 100;
            display: flex;
            flex-direction: row;
            gap: 16px;
        }
        .nav-dot {
            width: 14px; height: 14px;
            border-radius: 50%;
            background: var(--stone-light);
            border: 2.5px solid var(--sage-green);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .nav-dot.active { background: var(--sage-green); transform: scale(1.45); }
        .nav-dot:hover { background: var(--terracotta); transform: scale(1.3); }

        .scroll-progress {
            position: fixed; top:0; left:0; height:5px;
            background: linear-gradient(90deg, var(--sage-green), var(--terracotta));
            z-index: 1000; transition: width 0.15s ease; width:0;
        }

        .slide-counter {
            position: fixed; bottom:25px; right:25px;
            background: rgba(255,254,249,0.9);
            padding:10px 18px; border-radius:30px;
            font-size:0.95rem; box-shadow:0 6px 18px rgba(0,0,0,0.12);
            z-index:100; backdrop-filter: blur(6px);
        }

        #slide1 { background: linear-gradient(135deg, var(--bg-cream) 0%, var(--sand-warm) 100%); }
        #slide2, #slide6, #slide7 { background-color: var(--bg-cream); }
        #slide3, #slide8 { background: linear-gradient(180deg, var(--bg-cream) 0%, var(--stone-light) 100%); }
        #slide4 { background: linear-gradient(135deg, var(--sage-light) 0%, var(--bg-cream) 100%); }
        #slide5 { background: linear-gradient(135deg, var(--terracotta-light) 0%, var(--bg-cream) 100%); }

        .poem-container, .rules-container, .preposition-container, .comparison-container, .mindmap-container {
            max-width: 1280px; width: 94%; z-index:10;
        }

        .poem-container { display: grid; grid-template-columns: 1fr 1fr; gap: 35px; }
        .poem-blob { padding: 35px; box-shadow: 0 15px 45px rgba(0,0,0,0.08); }
        .poem-vietnamese { background: var(--sand-warm); }
        .poem-english    { background: var(--stone-light); }

        .preposition-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 28px; }
        .prep-leaf {
            background: var(--white-cream); padding: 28px; border-radius: 40% 60% 60% 40% / 40% 40% 60% 60%;
            box-shadow: 0 12px 30px rgba(0,0,0,0.1); transition: transform 0.3s;
        }
        .prep-leaf:hover { transform: translateY(-6px) scale(1.03); }

        .canopy-container { display: flex; flex-wrap: wrap; justify-content: center; gap: 16px; margin: 0 0 35px; }
        .canopy-word {
            background: var(--sage-green); color: white; padding: 12px 26px;
            border-radius: 50px; font-size: 1.2rem; box-shadow: 0 6px 18px rgba(107,142,35,0.3);
        }

        .comparison-container { display: grid; grid-template-columns: 1fr 1fr; gap: 35px; }
        .comparison-column { padding: 35px; border-radius: 28px; box-shadow: 0 18px 50px rgba(0,0,0,0.08); }

        .mindmap-root {
            background: var(--sage-green); color: white; padding: 30px 50px;
            border-radius: 60px; font-size: 2rem; margin: 0 auto 40px;
            box-shadow: 0 18px 50px rgba(107,142,35,0.4); text-align: center;
        }

        .qr-section img {
            width: 160px;
            height: 160px;
            object-fit: contain;
            border: 4px dashed var(--sage-green);
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.15);
            background: var(--white-cream);
            padding: 8px;
        }

        @media (max-width: 900px) {
            .poem-container, .comparison-container { grid-template-columns: 1fr; gap: 30px; }
            section.slide { padding: 25px 6% 70px; }
        }

        @media (max-width: 600px) {
            .intro-poem { font-size: clamp(1rem, 3.5vw, 1.25rem); }
            h1 { font-size: clamp(2rem, 8vw, 3.8rem); }
            .qr-section img { width: 140px; height: 140px; }
        }
    </style>
</head>
<body>

    <div class="scroll-progress" id="scrollProgress"></div>

    <div class="nav-dots" id="navDots">
        <div class="nav-dot active" data-slide="0"></div>
        <div class="nav-dot" data-slide="1"></div>
        <div class="nav-dot" data-slide="2"></div>
        <div class="nav-dot" data-slide="3"></div>
        <div class="nav-dot" data-slide="4"></div>
        <div class="nav-dot" data-slide="5"></div>
        <div class="nav-dot" data-slide="6"></div>
        <div class="nav-dot" data-slide="7"></div>
    </div>

    <div class="slide-counter" id="slideCounter">Slide 1 / 8</div>

    <div class="slides-container" id="slidesContainer">

        <!-- SLIDE 1 - TIÊU ĐỀ ĐÃ ĐƯỢC THAY ĐỔI -->
        <section class="slide" id="slide1">
            <svg class="leaf-bg leaf-1" viewBox="0 0 100 100" fill="currentColor"><path d="M50 0 C20 30 0 50 0 80 C0 95 15 100 30 100 C50 100 60 80 80 60 C90 50 100 40 100 20 C100 5 80 0 50 0 Z"/></svg>
            <svg class="leaf-bg leaf-2" viewBox="0 0 100 100" fill="currentColor"><path d="M50 0 C20 30 0 50 0 80 C0 95 15 100 30 100 C50 100 60 80 80 60 C90 50 100 40 100 20 C100 5 80 0 50 0 Z"/></svg>

            <div class="title-blob blob float" style="background:var(--sage-green); color:var(--white-cream); padding:60px 50px; max-width:900px; text-align:center; box-shadow:0 20px 60px rgba(107,142,35,0.3);">
                <h1>Cách 4 (Akkusative) tiếng Đức<br><span style="font-size:0.85em; opacity:0.9;">Tân ngữ trực tiếp</span></h1>
            </div>

            <div class="qr-section fade-in" style="margin-top:60px; animation-delay:0.6s; text-align:center;">
                <img src="https://i.postimg.cc/1thgyY3D/Screenshot-2026-03-22-at-12-03-11.png" alt="QR Code - Bài Trắc Nghiệm Akkusativ">
                <p style="color:var(--terracotta); font-weight:600; font-size:1.2rem; margin-top:25px;">📱 Quét mã QR để làm bài trắc nghiệm</p>
            </div>
        </section>

        <!-- Các slide còn lại giữ nguyên (bạn copy từ phiên bản trước) -->
        <section class="slide" id="slide2">
            <!-- ... nội dung slide 2 như trước ... -->
        </section>
        <!-- Slide 3 đến Slide 8 giống hệt phiên bản trước -->

    </div>

    <script>
        // JavaScript giữ nguyên như phiên bản trước
        const slidesContainer = document.getElementById('slidesContainer');
        const navDots = document.querySelectorAll('.nav-dot');
        const slideCounter = document.getElementById('slideCounter');
        const scrollProgress = document.getElementById('scrollProgress');

        function updateActiveSlide() {
            const scrollPos = slidesContainer.scrollLeft;
            const slideWidth = window.innerWidth;
            const activeIndex = Math.round(scrollPos / slideWidth);

            navDots.forEach((dot, i) => dot.classList.toggle('active', i === activeIndex));

            slideCounter.textContent = `Slide ${activeIndex + 1} / 8`;

            const progress = ((activeIndex + 1) / 8) * 100;
            scrollProgress.style.width = `${progress}%`;
        }

        navDots.forEach((dot, idx) => {
            dot.addEventListener('click', () => {
                slidesContainer.scrollTo({ left: idx * window.innerWidth, behavior: 'smooth' });
            });
        });

        slidesContainer.addEventListener('scroll', updateActiveSlide);

        document.addEventListener('keydown', e => {
            const current = Math.round(slidesContainer.scrollLeft / window.innerWidth);
            if (e.key === 'ArrowRight' || e.key === ' ') {
                e.preventDefault();
                if (current < 7) slidesContainer.scrollTo({ left: (current + 1) * window.innerWidth, behavior: 'smooth' });
            } else if (e.key === 'ArrowLeft') {
                e.preventDefault();
                if (current > 0) slidesContainer.scrollTo({ left: (current - 1) * window.innerWidth, behavior: 'smooth' });
            }
        });

        let touchStartX = 0;
        slidesContainer.addEventListener('touchstart', e => touchStartX = e.changedTouches[0].screenX);
        slidesContainer.addEventListener('touchend', e => {
            const diff = touchStartX - e.changedTouches[0].screenX;
            const current = Math.round(slidesContainer.scrollLeft / window.innerWidth);
            if (diff > 60 && current < 7) {
                slidesContainer.scrollTo({ left: (current + 1) * window.innerWidth, behavior: 'smooth' });
            } else if (diff < -60 && current > 0) {
                slidesContainer.scrollTo({ left: (current - 1) * window.innerWidth, behavior: 'smooth' });
            }
        });

        updateActiveSlide();
        window.addEventListener('resize', updateActiveSlide);

        const observer = new IntersectionObserver(entries => {
            entries.forEach(entry => {
                if (entry.isIntersecting) {
                    entry.target.style.opacity = '1';
                    entry.target.style.transform = 'translateY(0)';
                }
            });
        }, { threshold: 0.15, root: slidesContainer });

        document.querySelectorAll('.fade-in').forEach(el => {
            el.style.opacity = '0';
            el.style.transform = 'translateY(30px)';
            el.style.transition = 'all 1s ease-out';
            observer.observe(el);
        });
    </script>
</body>
</html>
